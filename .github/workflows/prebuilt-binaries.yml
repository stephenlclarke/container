name: Publish Current Runtime

on:
  workflow_run:
    workflows:
      - container project - merge build
    types:
      - completed

permissions:
  actions: read
  attestations: write
  contents: write
  id-token: write

concurrency:
  group: publish-current-runtime-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  resolve-publish-context:
    name: Resolve Publish Context
    if: >
      github.repository == 'stephenlclarke/container' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.context.outputs.publish }}
      sha: ${{ steps.context.outputs.sha }}
    steps:
      - name: Require the successful merge build
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail

          build_conclusion="$(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs/${WORKFLOW_RUN_ID}/jobs" \
              --jq ".jobs[] | select(.name | startswith(\"Invoke build\")) | .conclusion" \
              | tail -n 1
          )"
          if [[ "${build_conclusion}" != "success" ]]; then
            printf 'Skipping current runtime publish: merge build concluded %s.\n' \
              "${build_conclusion:-missing}"
            printf 'publish=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ! "${WORKFLOW_RUN_HEAD_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            printf 'merge-build did not provide a full commit SHA: %s\n' \
              "${WORKFLOW_RUN_HEAD_SHA}" >&2
            exit 1
          fi

          current_main="$(git ls-remote --heads "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk "{ print \$1 }" | tail -n 1)"
          if [[ "${current_main}" != "${WORKFLOW_RUN_HEAD_SHA}" ]]; then
            printf 'Skipping superseded merge build at %s; main is now %s.\n' \
              "${WORKFLOW_RUN_HEAD_SHA}" "${current_main:-missing}"
            printf 'publish=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'publish=true\n' >> "$GITHUB_OUTPUT"
          printf 'sha=%s\n' "${WORKFLOW_RUN_HEAD_SHA}" >> "$GITHUB_OUTPUT"

  package:
    name: Package Current Runtime
    needs: resolve-publish-context
    if: needs.resolve-publish-context.outputs.publish == 'true'
    runs-on: macos-26
    steps:
      - name: Checkout the validated runtime commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-publish-context.outputs.sha }}

      - name: Select current release identity
        id: lane
        env:
          PUBLISH_SHA: ${{ needs.resolve-publish-context.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${PUBLISH_SHA:0:12}"
          {
            printf 'asset=container-current-arm64.tar.gz\n'
            printf 'release_tag=current-%s-%s\n' "${GITHUB_RUN_NUMBER}" "${short_sha}"
            printf 'release_title=Current build · %s\n' "${short_sha}"
            printf 'version=current-release.%s.%s\n' "${GITHUB_RUN_NUMBER}" "${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Build current package
        run: make package BUILD_CONFIGURATION=release HOMEBREW_ARCHIVE="${RUNNER_TEMP}/${{ steps.lane.outputs.asset }}"

      - name: Attest current package
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: ${{ runner.temp }}/${{ steps.lane.outputs.asset }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.lane.outputs.asset }}
          path: |
            ${{ runner.temp }}/${{ steps.lane.outputs.asset }}
            ${{ runner.temp }}/${{ steps.lane.outputs.asset }}.sha256

      - name: Publish immutable current release
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET: ${{ steps.lane.outputs.asset }}
          PUBLISH_SHA: ${{ needs.resolve-publish-context.outputs.sha }}
          RELEASE_TAG: ${{ steps.lane.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.lane.outputs.release_title }}
          VERSION: ${{ steps.lane.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          tag_target="$(
            git ls-remote --tags --refs origin "refs/tags/${RELEASE_TAG}" \
              | awk "{print \$1}" \
              | tail -n 1
          )"
          if [[ -n "${tag_target}" && "${tag_target}" != "${PUBLISH_SHA}" ]]; then
            printf 'release tag %s already points at %s, refusing to retarget it to %s\n' \
              "${RELEASE_TAG}" "${tag_target}" "${PUBLISH_SHA}" >&2
            exit 1
          fi

          notes="$(mktemp)"
          {
            printf '## Current build\n\n'
            # shellcheck disable=SC2016 # Markdown backticks are intentional.
            printf 'Automated package for the validated `main` merge-build commit `%s`.\n\n' "${PUBLISH_SHA}"
            printf 'This is an installable current-runtime artifact. It never updates the stable Homebrew formula; the matched current stack is promoted atomically by container-compose.\n\n'
            printf '## Asset\n\n'
            # shellcheck disable=SC2016 # Markdown backticks are intentional.
            printf '- `%s` SHA-256: `%s`.\n' \
              "${ASSET}" "$(awk "{print \$1}" "${RUNNER_TEMP}/${ASSET}.sha256")"
          } > "$notes"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            printf 'release %s already exists; published releases are immutable\n' \
              "${RELEASE_TAG}" >&2
            exit 1
          fi

          gh release create "${RELEASE_TAG}" \
            "${RUNNER_TEMP}/${ASSET}" \
            "${RUNNER_TEMP}/${ASSET}.sha256" \
            --target "${PUBLISH_SHA}" \
            --title "${RELEASE_TITLE}" \
            --notes-file "$notes" \
            --prerelease
