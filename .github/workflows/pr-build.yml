name: container project - PR build

permissions:
  contents: read
  pull-requests: read

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: pr-build-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      heavy: ${{ steps.filter.outputs.heavy }}
    steps:
      - name: Classify changed files
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          changed_files="${RUNNER_TEMP}/changed-files.txt"
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate \
            --jq '.[].filename' > "$changed_files"

          heavy=false
          while IFS= read -r path; do
            case "$path" in
              *.md|docs/*|Formula/*)
                ;;
              *)
                heavy=true
                break
                ;;
            esac
          done < "$changed_files"

          printf 'heavy=%s\n' "$heavy" >> "$GITHUB_OUTPUT"

  verify-signatures:
    name: Verify commit signatures
    runs-on: ubuntu-latest
    steps:
      - name: Check all commits are signed
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          commits=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/commits" --paginate)
          unsigned_commits=""

          while IFS='|' read -r sha author verified; do
            if [ "$verified" != "true" ]; then
              unsigned_commits="$unsigned_commits  - $sha by $author\n"
            fi
          done < <(echo "$commits" | jq -r '.[] | "\(.sha)|\(.commit.author.name)|\(.commit.verification.verified)"')

          if [ -n "$unsigned_commits" ]; then
            echo "::error::The following commits are not signed:"
            echo -e "$unsigned_commits"
            echo ""
            echo "Please sign your commits. See:"
            echo  "  - https://github.com/apple/containerization/blob/main/CONTRIBUTING.md#pull-requests"
            echo  "  - https://docs.github.com/en/authentication/managing-commit-signature-verification/signing-commits"
            exit 1
          fi

          echo "All commits are signed!"

  build:
    name: Invoke build
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    uses: ./.github/workflows/common.yml
    with:
      release: false
      coverage: ${{ github.repository == 'apple/container' }}
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit
    permissions:
      contents: read
      packages: read
