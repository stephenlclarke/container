name: Homebrew

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "Formula/container.rb"
      - ".github/workflows/homebrew.yml"
  push:
    branches:
      - main
      - release
      - "release-*"
    paths:
      - "Formula/container.rb"
      - ".github/workflows/homebrew.yml"

permissions:
  contents: read

concurrency:
  group: homebrew-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  formula:
    name: Formula Syntax
    runs-on: macos-26
    steps:
      - name: Checkout container
        uses: actions/checkout@v7

      - name: Validate Ruby syntax
        run: ruby -c Formula/container.rb

      - name: Tap local formula
        run: |
          set -euo pipefail
          brew tap stephenlclarke/container "${GITHUB_WORKSPACE}"
          brew trust --tap stephenlclarke/container

      - name: Audit formula
        run: |
          set -euo pipefail
          brew audit --formula --strict --online stephenlclarke/container/container

      - name: Fetch formula archive
        run: |
          set -euo pipefail
          brew fetch --formula --force stephenlclarke/container/container

      - name: Install and test formula
        run: |
          set -euo pipefail
          brew install --formula stephenlclarke/container/container
          brew test stephenlclarke/container/container

      - name: Inspect formula
        run: |
          set -euo pipefail
          brew info --formula stephenlclarke/container/container
