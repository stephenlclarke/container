name: Homebrew

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "Formula/container.rb"
      - ".github/workflows/homebrew.yml"
      - ".github/workflows/prebuilt-binaries.yml"
      - "scripts/test_update_homebrew_formula.py"
      - "scripts/update-homebrew-formula.py"
  push:
    branches:
      - main
      - release
      - "release-*"
    paths:
      - "Formula/container.rb"
      - ".github/workflows/homebrew.yml"
      - ".github/workflows/prebuilt-binaries.yml"
      - "scripts/test_update_homebrew_formula.py"
      - "scripts/update-homebrew-formula.py"

permissions:
  contents: read

concurrency:
  group: homebrew-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  formula:
    name: Formula Syntax
    runs-on: macos-26
    steps:
      - name: Checkout container
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Test formula updater
        run: python3 -m unittest discover scripts -p 'test_update_homebrew_formula.py'

      - name: Validate Ruby syntax
        run: ruby -c Formula/container.rb

      - name: Tap local formula
        run: |
          set -euo pipefail
          brew tap stephenlclarke/container "${GITHUB_WORKSPACE}"
          brew trust --tap stephenlclarke/container

      - name: Validate immutable one-shot service
        run: |
          brew ruby -e '
            formula = Formulary.factory("stephenlclarke/container/container")
            url = formula.stable.url
            expected = %r{\Ahttps://github[.]com/stephenlclarke/container/releases/download/homebrew-main-[0-9]+-[0-9a-f]{12}/container-homebrew-main-release-arm64[.]tar[.]gz\z}
            abort "container formula must use an immutable package URL: #{url}" unless expected.match?(url)
            abort "container system start is a one-shot launcher and must not use KeepAlive" if formula.service.keep_alive?
          '

      - name: Audit formula
        run: |
          set -euo pipefail
          brew audit --formula --strict stephenlclarke/container/container

      - name: Check retained template archive
        id: template_archive
        run: |
          set -euo pipefail
          url="$(
            brew ruby -e '
              formula = Formulary.factory("stephenlclarke/container/container")
              puts formula.stable.url
            '
          )"
          if curl --fail --silent --show-error --location --head "${url}" >/dev/null; then
            printf 'available=true\n' >> "${GITHUB_OUTPUT}"
          else
            printf 'available=false\n' >> "${GITHUB_OUTPUT}"
            printf '::notice title=Retired template archive::%s\n' \
              "Release retention removed ${url}; active generated formulae remain release-gated."
          fi

      - name: Fetch formula archive
        if: steps.template_archive.outputs.available == 'true'
        run: |
          set -euo pipefail
          brew fetch --formula --force stephenlclarke/container/container

      - name: Install and test formula
        if: steps.template_archive.outputs.available == 'true'
        run: |
          set -euo pipefail
          brew install --formula stephenlclarke/container/container
          brew test stephenlclarke/container/container

      - name: Inspect formula
        run: |
          set -euo pipefail
          brew info --formula stephenlclarke/container/container
