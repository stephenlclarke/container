name: container project - merge build

permissions:
  contents: read

on:
  push:
    branches:
      - main

concurrency:
  group: merge-build-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      heavy: ${{ steps.filter.outputs.heavy }}
    steps:
      - name: Checkout for push diff
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          changed_files="${RUNNER_TEMP}/changed-files.txt"
          before="${{ github.event.before }}"
          after="${GITHUB_SHA}"
          if [[ "$before" =~ ^0+$ ]]; then
            git diff-tree --no-commit-id --name-only -r "$after" > "$changed_files"
          else
            git diff --name-only "$before" "$after" > "$changed_files"
          fi

          heavy=false
          while IFS= read -r path; do
            case "$path" in
              *.md|docs/*|Formula/*)
                ;;
              *)
                heavy=true
                break
                ;;
            esac
          done < "$changed_files"

          printf 'heavy=%s\n' "$heavy" >> "$GITHUB_OUTPUT"

  build:
    name: Invoke build
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    uses: ./.github/workflows/common.yml
    with:
      release: true
    secrets: inherit
    permissions:
      contents: read
      packages: read
      pages: write
